# Enable Encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
# Enable Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
# Enable Display
CONFIG_ZMK_DISPLAY=y

# OLED Animation
CONFIG_ZMK_WPM=y
CONFIG_NICE_OLED=y
CONFIG_NICE_OLED_WIDGET_WPM=y
CONFIG_NICE_OLED_WIDGET_ANIMATION=y

CONFIG_ZMK_KEYBOARD_NAME="Icarus"